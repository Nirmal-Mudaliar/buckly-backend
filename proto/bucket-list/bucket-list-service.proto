syntax = "proto3";

option go_package = "proto/bucket-list-gen";

import "proto/bucket-list/dto/bucket-list-dto.proto";

package bucket_list;

service BucketListService {
  rpc CreateBucketListItem(CreateBucketListItemRequest) returns (CreateBucketListItemResponse);
  rpc GetBucketListItemsByUserId(GetBucketListItemsByUserIdRequest) returns (GetBucketListItemsByUserIdResponse);
  rpc GetBucketListItemById(GetBucketListItemByIdRequest) returns (GetBucketListItemByIdResponse);
  rpc UpdateBucketListItem(UpdateBucketListItemRequest) returns (UpdateBucketListItemResponse);
  rpc DeleteBucketListItem(DeleteBucketListItemRequest) returns (DeleteBucketListItemResponse);
  rpc FindMatchesForBucketListItem(FindMatchesForBucketListItemRequest) returns (FindMatchesForBucketListItemResponse);
}