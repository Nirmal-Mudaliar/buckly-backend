syntax = "proto3";

option go_package = "proto/database-gen";

import "google/protobuf/empty.proto";
import "proto/database/dto/users.proto";

package database;

service DatabaseService {
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc GetAllUsers(google.protobuf.Empty) returns (GetAllUsersResponse);
  rpc GetUserByPhoneNo(GetUserByPhoneNoRequest) returns (GetUserByPhoneNoResponse);
  rpc GetUserByEmail(GetUserByEmailRequest) returns (GetUserByEmailResponse);
  rpc UpdatePhoneNoVerified(UpdatePhoneNoVerifiedRequest) returns (UpdatePhoneNoVerifiedResponse);
  rpc StoreRefreshToken(StoreRefreshTokenRequest) returns (StoreRefreshTokenResponse);
  rpc DeleteUnverifiedUserByUserId(DeleteUnverifiedUserByUserIdRequest) returns (DeleteUnverifiedUserByUserIdResponse);
}